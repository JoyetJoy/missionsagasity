# DigitalOcean App Platform Specification
# Deploy: doctl apps create --spec .do/app.yaml
# Or import via DigitalOcean dashboard > Apps > Create App > from GitHub repo

name: mission-sagacity-api

region: nyc

services:
  - name: api
    github:
      repo: YOUR_GITHUB_USERNAME/mission-sagacity-backend
      branch: main
      deploy_on_push: true
    source_dir: /
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb  # $5/mo starter
    routes:
      - path: /
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: "${db.DATABASE_URL}"
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: CHANGE_ME_TO_A_SECURE_RANDOM_STRING
      - key: JWT_EXPIRES_IN
        scope: RUN_TIME
        value: "7d"
      - key: NODE_ENV
        scope: RUN_TIME
        value: "production"
      - key: CORS_ORIGINS
        scope: RUN_TIME
        value: "https://your-frontend-domain.com,https://*.figma.com,https://*.framer.app"
    health_check:
      http_path: /api/health

databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-dev-database  # $0 dev database (or db-s-1vcpu-1gb for $15/mo)
    num_nodes: 1